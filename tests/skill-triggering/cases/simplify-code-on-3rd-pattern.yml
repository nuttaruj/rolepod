name: simplify-code-on-3rd-pattern
skill: simplify-code
prompt: |
  I'm about to add the same retry-with-backoff loop in a third place — once in
  the email sender, once in the webhook dispatcher, and now in the payment
  refund handler. Each one has slightly different jitter constants. Should
  I just copy-paste the third one and tweak the constants?
must_trigger: true
why: |
  Same pattern in 3+ places is the canonical simplify-code centralize trigger.
must_not_skip_excuse: |
  just this one place
