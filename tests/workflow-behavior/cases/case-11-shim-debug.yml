name: case-11-shim-debug
prompt: |
  Same bug keeps recurring with different surfaces. Trace it systematically.
expected_skills:
  - using-rolepod
  - debug-issue
must_not_contain:
  - "first plausible cause"
  - "add a try-catch and move on"
why: |
  Old trigger phrasing for `systematic-debugging` (recurring bug, systematic
  trace). The shim at `core/skills/systematic-debugging/SKILL.md` redirects
  Lead to `debug-issue`. Test proves the canonical Core 10 route catches the
  legacy phrasing during the migration release.
