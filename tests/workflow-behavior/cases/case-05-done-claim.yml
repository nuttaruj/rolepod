name: case-05-done-claim
prompt: |
  Is this done?
expected_skills:
  - using-rolepod
  - check-work
must_not_contain:
  - "Yes, it's done"
  - "Looks done to me"
  - "should be done"
why: |
  Claim-of-done routes through check-work. Must produce evidence (test
  output, screenshot, curl, log) before answering "yes". No vibe-based
  confirmation.
