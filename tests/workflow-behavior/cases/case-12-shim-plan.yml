name: case-12-shim-plan
prompt: |
  Break this goal into ordered tasks with tests per task.
expected_skills:
  - using-rolepod
  - write-plan
must_not_contain:
  - "start editing files"
  - "without a task list"
why: |
  Old trigger phrasing for `planning-and-task-breakdown` (break goal,
  ordered tasks). The shim redirects Lead to `write-plan`. Test proves the
  canonical Core 10 route catches the legacy phrasing during the migration
  release.
