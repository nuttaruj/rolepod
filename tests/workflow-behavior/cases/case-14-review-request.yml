name: case-14-review-request
prompt: |
  Request code review on this diff.
expected_skills:
  - using-rolepod
  - review-code
must_not_contain:
  - "looks good to me"
  - "LGTM without checking"
  - "I'll just approve"
why: |
  Generic review-request trigger routes through review-code. Reviewer should
  walk the multi-axis checklist (correctness + security + performance +
  architecture + UI + tests) and report findings severity-ordered, not
  rubber-stamp the diff. Spec line 994 ("request code review" → review-code).
