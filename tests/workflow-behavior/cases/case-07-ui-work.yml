name: case-07-ui-work
prompt: |
  Improve this dashboard layout and verify it in browser.
expected_skills:
  - using-rolepod
  - implement-plan
  - check-work
must_not_contain:
  - "send me a screenshot"
  - "could you take a screenshot"
  - "please verify in your browser"
why: |
  UI implementation routes through implement-plan; browser verification routes
  through check-work (Playwright / DevTools MCP). Lead drives the browser,
  does not outsource verification to the user.
