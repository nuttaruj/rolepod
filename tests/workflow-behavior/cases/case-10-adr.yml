name: case-10-adr
prompt: |
  Document why we chose this auth architecture.
expected_skills:
  - using-rolepod
  - documentation-and-adrs
must_not_contain:
  - "generic auth docs"
  - "without alternatives"
  - "without trade-offs"
why: |
  Architecture documentation routes through documentation-and-adrs.
  ADR shape: context + alternatives considered + decision + consequences. Not a
  generic doc page that explains how it works today.
