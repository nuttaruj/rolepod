name: case-10-adr
prompt: |
  Document why we chose this auth architecture.
expected_skills:
  - using-rolepod
  - implement-plan
must_not_contain:
  - "generic auth docs"
  - "without alternatives"
  - "without trade-offs"
why: |
  Architecture documentation routes through implement-plan (the ADR is a
  writing artifact); the `tech-writer` agent adds depth when available.
  ADR shape: context + alternatives considered + decision + consequences.
  Not a generic doc page that explains how it works today.
