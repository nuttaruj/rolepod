name: case-03-execute-plan
prompt: |
  Execute the implementation plan in docs/plans/auth-refresh.md.
expected_skills:
  - using-rolepod
  - implement-plan
must_not_contain:
  - "start coding right away"
  - "skip the plan"
  - "without reading the plan"
why: |
  When a plan exists, route through implement-plan to read tasks first,
  use TDD for risky paths, and produce evidence. Don't jump straight into
  implementation without reading the plan.
