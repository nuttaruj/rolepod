name: case-08-security
prompt: |
  Change password reset token handling.
expected_skills:
  - using-rolepod
  - write-plan
  - review-code
must_not_contain:
  - "without tests"
  - "skip the review"
  - "trivial change"
why: |
  High-risk surface (auth + token + crypto). Must route through write-plan
  for the plan (with security surface flagged), then review-code for
  adversarial review before merge. Block-subagent-commit hook + Fix 3
  reviewer-floor hook backstop this for sub-agent commits, but the doctrine
  path fires first.
