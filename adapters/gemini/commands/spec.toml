description = "Start spec-driven development — write a structured specification before writing code."
prompt = """
Write a structured specification before code.

Sections (all required):
  ## Problem
  Who hits this, how often, current workaround, cost of inaction.

  ## Goal
  One sentence. Verifiable.

  ## Non-goals
  Explicitly excluded scope. Saves arguments later.

  ## Users / actors
  Who interacts with this and how.

  ## Behavior
  Inputs, outputs, side effects, error paths, edge cases.

  ## Constraints
  Performance, security, compliance, backward compat.

  ## Open questions
  Things you can't decide alone — surface for the user.

  ## Acceptance criteria
  Concrete checks (test names / curl examples / screenshots) that prove "done".

Write to SPEC.md in repo root unless user specifies a different path.
After spec is written, suggest the user start a fresh session for implementation.

Topic:
{{args}}
"""
