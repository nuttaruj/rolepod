description = "Conduct a five-axis code review on the current diff or specified files: correctness, readability, architecture, security, performance."
prompt = """
Conduct a five-axis code review.

Axes (rank each as PASS / WARN / FAIL with one-line rationale):
1. Correctness — logic bugs, off-by-one, error paths, edge cases
2. Readability — naming, structure, comments only when non-obvious
3. Architecture — single source of truth, no spaghetti, layering respected
4. Security — input validation, authn/authz, secrets handling, SSRF, injection
5. Performance — obvious O(n^2) traps, N+1 queries, blocking I/O on hot path

Adversarial mindset by default. For each FAIL, give:
  - what fails (file:line)
  - why
  - impact
  - concrete fix

If diff not provided, run `git diff` first. If specific files mentioned in args, focus there.

Target:
{{args}}
"""
