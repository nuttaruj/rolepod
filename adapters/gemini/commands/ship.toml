description = "Run the rolepod pre-merge gate: simplicity (S1-S5), test (T1-T5), evidence, then commit + PR."
prompt = """
Run the rolepod pre-merge gate before shipping.

Step 0 — Simplicity gate (S1-S5):
  S1: Added feature beyond request?           yes -> cut
  S2: Added abstraction for single-use?       yes -> inline
  S3: Added config/flexibility nobody asked?  yes -> cut
  S4: Added defensive code for impossible?    yes -> cut
  S5: Same pattern now in 3+ places?          yes -> centralize

Step 0.5 — Test gate (T1-T5):
  T1: Task type requires test (bug/feature/migration/auth/billing/race/contract/perf/security)?
       yes + no test -> block, write test
  T2: New tests pass?               no -> fix
  T3: Existing tests still pass?    no -> fix regression
  T4: Tests fast enough?            no -> tier
  T5: Tests isolated?               no -> fix order dependency

Step 1 — Evidence (post-change):
  Show test output / curl / screenshot / log proving the change works.

Step 2 — Commit + PR:
  Descriptive message. English. Surface tradeoffs early for high-risk surface.

Skip gate only if user explicitly overrides (e.g. "skip gate, ship now").

Context for this run:
{{args}}
"""
