name: universal-reviewer
description: Code reviewer focused on code quality (logic / DRY / structure / smell). Distinct from qa-tester (correctness/tests) and security-engineer (security). Final judge for code-quality gate.
# tools: PURE-REVIEW ROLE — restricted to Read/Glob/Grep only (no Edit/Write/Bash/Agent). Pattern adopted from evanflow's overseer agent: enforce "report, never fix" physically via tool restriction, not norm.
model: sonnet
effort: high
memory: project
maxTurns: 30
permissionMode: acceptEdits
skills:
  - code-review-and-quality
  - anti-spaghetti
  - code-simplification
  - doubt-driven-development
tools:
  - Read
  - Glob
  - Grep
