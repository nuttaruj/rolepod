name: installer

on:
  push:
    branches: [main]
  pull_request:

jobs:
  installer:
    name: lint, render, install round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Static checks (bash -n on all shell scripts)
        shell: bash
        run: |
          set -eo pipefail
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::bash -n failed"
              fail=1
            fi
          done < <(printf '%s\n' \
            install.sh \
            bootstrap.sh \
            build/render.sh \
            $(find hooks adapters/codex/plugins/rolepod/hooks adapters/gemini/hooks -maxdepth 1 -name '*.sh' 2>/dev/null))
          exit "$fail"

      - name: JSON syntax check (adapter manifests + plugin metadata)
        shell: bash
        run: |
          set -eo pipefail
          fail=0
          while IFS= read -r f; do
            if ! python3 -m json.tool "$f" >/dev/null; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done < <(find adapters .claude-plugin -name '*.json' 2>/dev/null)
          exit "$fail"

      - name: TOML syntax check (codex agents + gemini commands)
        shell: bash
        run: |
          set -eo pipefail
          python3 - <<'PY'
          import sys, pathlib, tomllib
          fail = 0
          roots = ["adapters/codex/plugins/rolepod/agents", "adapters/gemini/commands"]
          for root in roots:
              p = pathlib.Path(root)
              if not p.exists():
                  continue
              for f in p.rglob("*.toml"):
                  try:
                      with open(f, "rb") as fh:
                          tomllib.load(fh)
                  except Exception as e:
                      print(f"::error file={f}::invalid TOML: {e}")
                      fail = 1
          sys.exit(fail)
          PY

      - name: Thai char scan (English-only invariant)
        shell: bash
        run: |
          set -eo pipefail
          python3 - <<'PY'
          import sys, subprocess
          tracked = subprocess.check_output(
              ["git", "ls-files"], text=True
          ).splitlines()
          fail = 0
          for path in tracked:
              try:
                  with open(path, "r", encoding="utf-8", errors="ignore") as f:
                      for lineno, line in enumerate(f, 1):
                          for ch in line:
                              if 0x0E00 <= ord(ch) <= 0x0E7F:
                                  print(f"::error file={path},line={lineno}::Thai char detected (U+{ord(ch):04X})")
                                  fail = 1
                                  break
              except (IsADirectoryError, FileNotFoundError):
                  continue
          sys.exit(fail)
          PY

      - name: Render all 3 targets
        shell: bash
        run: |
          set -eo pipefail
          if ! bash build/render.sh --target=all; then
            echo "::error::build/render.sh --target=all failed"
            exit 1
          fi
          # No template leaks
          if grep -rn '{{INCLUDE:' build/rendered/ 2>/dev/null; then
            echo "::error::Unrendered {{INCLUDE:...}} marker found in build/rendered/"
            exit 1
          fi

      - name: Post-render JSON syntax check (rendered artifacts)
        shell: bash
        run: |
          set -eo pipefail
          fail=0
          while IFS= read -r f; do
            if ! python3 -m json.tool "$f" >/dev/null; then
              echo "::error file=$f::invalid JSON in rendered output"
              fail=1
            fi
          done < <(find build/rendered -name '*.json' 2>/dev/null)
          exit "$fail"

      - name: Snapshot test (Claude byte-identical)
        shell: bash
        run: |
          set -eo pipefail
          if ! diff -q CLAUDE.md build/rendered/claude/CLAUDE.md; then
            echo "::error::CLAUDE.md drift — repo root differs from build/rendered/claude/CLAUDE.md"
            diff -u CLAUDE.md build/rendered/claude/CLAUDE.md | head -80 || true
            exit 1
          fi

      - name: Dry-run install — claude
        shell: bash
        run: |
          set -eo pipefail
          export ROLEPOD_TARGET="$(mktemp -d)"
          echo "claude target: $ROLEPOD_TARGET"
          out=$(bash install.sh --target=claude --force 2>&1) || {
            echo "::error::install.sh --target=claude failed"
            printf '%s\n' "$out"
            exit 1
          }
          if grep -qi 'command not found' <<<"$out"; then
            echo "::error::'command not found' in claude install output"
            printf '%s\n' "$out"
            exit 1
          fi
          # Expected files
          for rel in \
            agents/qa-tester.md \
            rules/INDEX.md \
            skills/anti-spaghetti/SKILL.md \
            .claude-plugin/plugin.json \
            settings.json
          do
            if [ ! -e "$ROLEPOD_TARGET/$rel" ]; then
              echo "::error::missing post-install file: $ROLEPOD_TARGET/$rel"
              exit 1
            fi
          done
          # settings.json contains rolepod hook registrations (referenced by
          # path under $ROLEPOD_TARGET/hooks/, not by the literal name).
          if ! python3 -c "
          import json, sys, os
          target = os.environ['ROLEPOD_TARGET']
          with open(os.path.join(target, 'settings.json')) as f:
              data = json.load(f)
          hooks = data.get('hooks', {})
          required = ['SessionStart', 'PreToolUse', 'PostToolUse']
          missing = [k for k in required if k not in hooks]
          if missing:
              print(f'missing hook keys: {missing}')
              sys.exit(1)
          # At least one hook entry must reference our hooks dir.
          import re
          payload = json.dumps(data)
          if os.path.join(target, 'hooks') not in payload:
              print('no hook command points at \$ROLEPOD_TARGET/hooks/')
              sys.exit(1)
          "; then
            echo "::error::settings.json missing rolepod hook registration"
            cat "$ROLEPOD_TARGET/settings.json"
            exit 1
          fi
          # Final-message
          if ! grep -q 'restart Claude Code' <<<"$out"; then
            echo "::error::missing 'restart Claude Code' in final message"
            exit 1
          fi
          echo "ROLEPOD_CLAUDE_TARGET=$ROLEPOD_TARGET" >> "$GITHUB_ENV"

      - name: --force backup is rolepod-scoped (claude)
        shell: bash
        run: |
          set -eo pipefail
          # Fresh HOME so backup path is predictable + isolated from runner state.
          export HOME="$(mktemp -d)"
          export ROLEPOD_TARGET="$HOME/.claude"
          # Pre-populate a "user" ~/.claude that mixes rolepod-managed paths
          # with bloat dirs that --force backup MUST skip.
          mkdir -p "$ROLEPOD_TARGET/projects/sess-abc" \
                   "$ROLEPOD_TARGET/plugins/cache" \
                   "$ROLEPOD_TARGET/file-history" \
                   "$ROLEPOD_TARGET/shell-snapshots" \
                   "$ROLEPOD_TARGET/agent-memory" \
                   "$ROLEPOD_TARGET/agents" \
                   "$ROLEPOD_TARGET/rules"
          # 2 MB fake session blob — proxy for real session history.
          dd if=/dev/zero of="$ROLEPOD_TARGET/projects/sess-abc/big.log" bs=1024 count=2048 2>/dev/null
          echo "preexisting-claude-md" > "$ROLEPOD_TARGET/CLAUDE.md"
          echo "preexisting-agent"     > "$ROLEPOD_TARGET/agents/old.md"

          bash install.sh --target=claude --force >/dev/null

          # Backup MUST be sibling-of-target — NOT hardcoded to $HOME.
          BACKUP=$(ls -d "${ROLEPOD_TARGET}".backup-* 2>/dev/null | head -1)
          if [ -z "$BACKUP" ]; then
            echo "::error::no backup dir created by --force at sibling of target ($ROLEPOD_TARGET.backup-*)"
            ls -la "$(dirname "$ROLEPOD_TARGET")/"
            exit 1
          fi
          # Assert no stray backup leaked into $HOME root when target != $HOME/.claude.
          # Here target IS $HOME/.claude so sibling lands in $HOME — that's correct.
          # The check: backup parent dir must equal target parent dir.
          if [ "$(dirname "$BACKUP")" != "$(dirname "$ROLEPOD_TARGET")" ]; then
            echo "::error::backup not a sibling of target — backup=$BACKUP target=$ROLEPOD_TARGET"
            exit 1
          fi
          echo "backup: $BACKUP (sibling of $ROLEPOD_TARGET ✓)"
          # Excluded paths MUST NOT appear in backup.
          for excluded in projects plugins/cache file-history shell-snapshots agent-memory; do
            if [ -e "$BACKUP/$excluded" ]; then
              echo "::error::backup contains excluded path: $excluded"
              ls -la "$BACKUP"
              exit 1
            fi
          done
          # Included paths MUST appear (and carry pre-existing content).
          for included in CLAUDE.md agents/old.md; do
            if [ ! -e "$BACKUP/$included" ]; then
              echo "::error::backup missing rolepod-managed path: $included"
              ls -la "$BACKUP"
              exit 1
            fi
          done
          # Size sanity check: backup should be far smaller than the 2 MB blob.
          backup_kb=$(du -sk "$BACKUP" | awk '{print $1}')
          if [ "$backup_kb" -gt 1024 ]; then
            echo "::error::backup ($backup_kb KB) too large — bloat dirs may be slipping in"
            du -sh "$BACKUP"/*
            exit 1
          fi
          echo "✓ backup ${backup_kb}KB — rolepod-scoped (projects/ + bloat excluded)"

      - name: Dry-run install — codex
        shell: bash
        run: |
          set -eo pipefail
          export ROLEPOD_TARGET="$(mktemp -d)"
          echo "codex target: $ROLEPOD_TARGET"
          out=$(bash install.sh --target=codex --force 2>&1) || {
            echo "::error::install.sh --target=codex failed"
            printf '%s\n' "$out"
            exit 1
          }
          if grep -qi 'command not found' <<<"$out"; then
            echo "::error::'command not found' in codex install output"
            printf '%s\n' "$out"
            exit 1
          fi
          for rel in \
            plugins/rolepod/.codex-plugin/plugin.json \
            plugins/rolepod/agents/qa-tester.toml \
            plugins/rolepod/skills/anti-spaghetti/SKILL.md \
            AGENTS.md
          do
            if [ ! -e "$ROLEPOD_TARGET/$rel" ]; then
              echo "::error::missing post-install file: $ROLEPOD_TARGET/$rel"
              exit 1
            fi
          done
          if ! grep -q 'restart Codex CLI' <<<"$out"; then
            echo "::error::missing 'restart Codex CLI' in final message"
            exit 1
          fi
          echo "ROLEPOD_CODEX_TARGET=$ROLEPOD_TARGET" >> "$GITHUB_ENV"

      - name: Dry-run install — gemini
        shell: bash
        run: |
          set -eo pipefail
          export ROLEPOD_TARGET="$(mktemp -d)"
          echo "gemini target: $ROLEPOD_TARGET"
          out=$(bash install.sh --target=gemini --force 2>&1) || {
            echo "::error::install.sh --target=gemini failed"
            printf '%s\n' "$out"
            exit 1
          }
          if grep -qi 'command not found' <<<"$out"; then
            echo "::error::'command not found' in gemini install output"
            printf '%s\n' "$out"
            exit 1
          fi
          for rel in \
            extensions/rolepod/gemini-extension.json \
            extensions/rolepod/commands/careful.toml \
            extensions/rolepod/skills/anti-spaghetti/SKILL.md \
            GEMINI.md
          do
            if [ ! -e "$ROLEPOD_TARGET/$rel" ]; then
              echo "::error::missing post-install file: $ROLEPOD_TARGET/$rel"
              exit 1
            fi
          done
          if ! grep -q 'restart Gemini CLI' <<<"$out"; then
            echo "::error::missing 'restart Gemini CLI' in final message"
            exit 1
          fi
          echo "ROLEPOD_GEMINI_TARGET=$ROLEPOD_TARGET" >> "$GITHUB_ENV"

      - name: Dry-run install — all
        shell: bash
        run: |
          set -eo pipefail
          export ROLEPOD_TARGET="$(mktemp -d)"
          echo "all target: $ROLEPOD_TARGET"
          out=$(bash install.sh --target=all --force 2>&1) || {
            echo "::error::install.sh --target=all failed"
            printf '%s\n' "$out"
            exit 1
          }
          if grep -qi 'command not found' <<<"$out"; then
            echo "::error::'command not found' in 'all' install output"
            printf '%s\n' "$out"
            exit 1
          fi
          if ! grep -q 'restart Claude Code, Codex CLI, and Gemini CLI' <<<"$out"; then
            echo "::error::missing combined restart message in --target=all output"
            exit 1
          fi

      - name: Uninstall round-trip — managed-block preservation
        shell: bash
        run: |
          set -eo pipefail
          # Use the claude target from earlier install. Seed user content
          # OUTSIDE the rolepod managed block; verify it survives uninstall.
          target="${ROLEPOD_CLAUDE_TARGET:?missing target from earlier step}"
          claude_md="$target/CLAUDE.md"
          if [ ! -f "$claude_md" ]; then
            echo "::error::expected $claude_md after install"
            exit 1
          fi
          # Prepend a sentinel above the rolepod block.
          sentinel='### user-sentinel-DO-NOT-REMOVE ###'
          tmp="$(mktemp)"
          { printf '%s\n\n' "$sentinel"; cat "$claude_md"; } > "$tmp"
          mv "$tmp" "$claude_md"

          # Run uninstall.
          out=$(bash install.sh --target=claude --uninstall --yes 2>&1) || {
            echo "::error::uninstall failed"
            printf '%s\n' "$out"
            exit 1
          }

          # Sentinel must survive.
          if ! grep -qF "$sentinel" "$claude_md" 2>/dev/null; then
            echo "::error::uninstall removed user content outside managed block"
            cat "$claude_md" || true
            exit 1
          fi
          # Rolepod artifacts gone.
          for rel in \
            agents/qa-tester.md \
            rules/INDEX.md \
            skills/anti-spaghetti/SKILL.md \
            .claude-plugin/plugin.json
          do
            if [ -e "$target/$rel" ]; then
              echo "::error::uninstall did not remove $target/$rel"
              exit 1
            fi
          done
          # Managed block markers gone from CLAUDE.md.
          if grep -qE 'rolepod:(start|end)' "$claude_md"; then
            echo "::error::uninstall left rolepod managed-block markers in CLAUDE.md"
            exit 1
          fi

      - name: Non-TTY uninstall without --yes — graceful abort (refs #2)
        shell: bash
        run: |
          set -eo pipefail
          # In a non-interactive context (no /dev/tty + stdin redirected),
          # uninstall without --yes must NOT crash on /dev/tty redirect.
          # It must exit 0 and print "Aborted" with re-run hint.
          export ROLEPOD_TARGET="$(mktemp -d)"
          out=$(bash install.sh --uninstall --target=codex < /dev/null 2>&1)
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::error::non-TTY uninstall returned $rc (expected 0)"
            printf '%s\n' "$out"
            exit 1
          fi
          if ! grep -qi 'Aborted' <<<"$out"; then
            echo "::error::non-TTY uninstall did not print 'Aborted'"
            printf '%s\n' "$out"
            exit 1
          fi
          if grep -qi 'Device not configured' <<<"$out"; then
            echo "::error::non-TTY uninstall crashed with 'Device not configured'"
            printf '%s\n' "$out"
            exit 1
          fi

      - name: --target=all + ROLEPOD_TARGET — subdir layout (refs #2)
        shell: bash
        run: |
          set -eo pipefail
          # When --target=all AND ROLEPOD_TARGET is set, all 3 CLIs must land
          # under $ROLEPOD_TARGET/<cli>/ — never default to $HOME/.claude etc.
          export ROOT="$(mktemp -d)"
          out=$(ROLEPOD_TARGET="$ROOT" bash install.sh --target=all --dry-run 2>&1)
          # Must mention subdir-layout paths.
          for sub in claude codex gemini; do
            if ! grep -qF "$ROOT/$sub" <<<"$out"; then
              echo "::error::--target=all + ROLEPOD_TARGET did not write $ROOT/$sub paths"
              printf '%s\n' "$out"
              exit 1
            fi
          done
          # Must NOT fall back to real home paths.
          for home_path in "$HOME/.claude" "$HOME/.codex" "$HOME/.gemini"; do
            if grep -qF "$home_path" <<<"$out"; then
              echo "::error::--target=all + ROLEPOD_TARGET leaked real home path: $home_path"
              printf '%s\n' "$out"
              exit 1
            fi
          done

      - name: --target=all without ROLEPOD_TARGET — back-compat home paths
        shell: bash
        run: |
          set -eo pipefail
          # Unset ensures back-compat: --target=all with no env var → 3 home defaults.
          unset ROLEPOD_TARGET
          out=$(bash install.sh --target=all --dry-run 2>&1)
          for home_path in "$HOME/.claude" "$HOME/.codex" "$HOME/.gemini"; do
            if ! grep -qF "$home_path" <<<"$out"; then
              echo "::error::--target=all without env var dropped expected home path: $home_path"
              printf '%s\n' "$out"
              exit 1
            fi
          done

      - name: Per-CLI override env vars (refs #2)
        shell: bash
        run: |
          set -eo pipefail
          # ROLEPOD_<CLI>_TARGET wins over ROLEPOD_TARGET for that CLI only.
          export ROOT="$(mktemp -d)"
          export GEM_OVERRIDE="$(mktemp -d)/gem-custom"
          out=$(ROLEPOD_TARGET="$ROOT" ROLEPOD_GEMINI_TARGET="$GEM_OVERRIDE" \
                bash install.sh --target=all --dry-run 2>&1)
          # Claude + Codex still under ROOT subdirs.
          if ! grep -qF "$ROOT/claude" <<<"$out"; then
            echo "::error::Claude target should be $ROOT/claude"
            exit 1
          fi
          if ! grep -qF "$ROOT/codex" <<<"$out"; then
            echo "::error::Codex target should be $ROOT/codex"
            exit 1
          fi
          # Gemini uses the override.
          if ! grep -qF "$GEM_OVERRIDE" <<<"$out"; then
            echo "::error::Gemini target should be $GEM_OVERRIDE (override)"
            exit 1
          fi
          # And NOT under ROOT/gemini.
          if grep -qF "$ROOT/gemini" <<<"$out"; then
            echo "::error::Gemini override should beat ROLEPOD_TARGET subdir"
            exit 1
          fi

      - name: Codex temp-target — global config not mutated (refs #3)
        shell: bash
        run: |
          set -eo pipefail
          # When ROLEPOD_TARGET points away from $HOME/.codex, the installer
          # must NOT mutate the user's real ~/.codex/config.toml. Codex CLI has
          # no per-target config home, so marketplace registration would
          # otherwise leak into the global config.
          mkdir -p "$HOME/.codex"
          touch "$HOME/.codex/config.toml"
          BEFORE=$(sha256sum "$HOME/.codex/config.toml" | awk '{print $1}')
          ROLEPOD_TARGET="$(mktemp -d)" bash install.sh --core --target=codex --dry-run > out.log 2>&1
          AFTER=$(sha256sum "$HOME/.codex/config.toml" | awk '{print $1}')
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "::error::Codex temp-target dry-run mutated $HOME/.codex/config.toml"
            cat out.log
            exit 1
          fi
          # Sanity: warning was emitted referencing global skip behavior.
          if ! grep -qi 'skipping global marketplace registration' out.log; then
            echo "::error::expected 'skipping global marketplace registration' warning in temp-target mode"
            cat out.log
            exit 1
          fi
          # Real install (no ROLEPOD_TARGET) is also tested with dry-run to
          # confirm the real-path branch fires the marketplace command (well,
          # would have — dry-run shows the [DRY-RUN] preview).
          unset ROLEPOD_TARGET
          out=$(bash install.sh --core --target=codex --dry-run 2>&1) || true
          if grep -qi 'skipping global marketplace registration' <<<"$out"; then
            echo "::error::real-install path should NOT print temp-target warning"
            printf '%s\n' "$out"
            exit 1
          fi

      - name: Dry-run writes nothing — file count snapshot
        shell: bash
        run: |
          set -eo pipefail
          export ROOT="$(mktemp -d)"
          mkdir -p "$ROOT/.claude" "$ROOT/.codex" "$ROOT/.gemini"
          BEFORE=$(find "$ROOT" -type f 2>/dev/null | wc -l)
          ROLEPOD_TARGET="$ROOT" bash install.sh --target=all --dry-run > /dev/null 2>&1
          AFTER=$(find "$ROOT" -type f 2>/dev/null | wc -l)
          if [ "$BEFORE" -ne "$AFTER" ]; then
            echo "::error::dry-run wrote files: before=$BEFORE after=$AFTER"
            find "$ROOT" -type f
            exit 1
          fi

      - name: --scope=project — claude lands at $PWD/.claude (refs #2 #3)
        shell: bash
        run: |
          set -eo pipefail
          # scope=project must NOT touch $HOME/.claude. It writes to $PWD/.claude.
          unset ROLEPOD_TARGET
          WORK="$(mktemp -d)"
          # Snapshot HOME state before.
          BEFORE_HOME=$(find "$HOME/.claude" -type f 2>/dev/null | wc -l)
          out=$(cd "$WORK" && bash "$GITHUB_WORKSPACE/install.sh" --target=claude --scope=project --dry-run 2>&1)
          # Must preview $WORK/.claude paths.
          if ! grep -qF "$WORK/.claude" <<<"$out"; then
            echo "::error::scope=project did not preview \$PWD/.claude paths"
            printf '%s\n' "$out"
            exit 1
          fi
          # Must NOT preview $HOME/.claude.
          if grep -qF "$HOME/.claude" <<<"$out"; then
            echo "::error::scope=project leaked \$HOME/.claude path"
            printf '%s\n' "$out"
            exit 1
          fi
          # Final message variant.
          if ! grep -q 'restart Claude Code in this project' <<<"$out"; then
            echo "::error::scope=project missing project-aware final message"
            exit 1
          fi
          # HOME must not have grown.
          AFTER_HOME=$(find "$HOME/.claude" -type f 2>/dev/null | wc -l)
          if [ "$BEFORE_HOME" -ne "$AFTER_HOME" ]; then
            echo "::error::scope=project --dry-run mutated \$HOME/.claude"
            exit 1
          fi

      - name: --scope=project — codex writes only AGENTS.md (refs #2 #3)
        shell: bash
        run: |
          set -eo pipefail
          unset ROLEPOD_TARGET
          WORK="$(mktemp -d)"
          mkdir -p "$HOME/.codex"
          touch "$HOME/.codex/config.toml"
          BEFORE=$(sha256sum "$HOME/.codex/config.toml" | awk '{print $1}')
          out=$(cd "$WORK" && bash "$GITHUB_WORKSPACE/install.sh" --target=codex --scope=project --dry-run 2>&1)
          AFTER=$(sha256sum "$HOME/.codex/config.toml" | awk '{print $1}')
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "::error::scope=project mutated \$HOME/.codex/config.toml"
            exit 1
          fi
          if ! grep -qi 'Codex plugins are global only' <<<"$out"; then
            echo "::error::scope=project missing 'plugins are global only' warning for codex"
            exit 1
          fi
          if ! grep -qF "$WORK/AGENTS.md" <<<"$out"; then
            echo "::error::scope=project did not preview \$PWD/AGENTS.md for codex"
            exit 1
          fi
          # Must NOT preview the marketplace registration / plugin tree paths.
          if grep -qi 'codex plugin marketplace add' <<<"$out"; then
            echo "::error::scope=project should not run 'codex plugin marketplace add'"
            exit 1
          fi
          if ! grep -q 'auto-loads' <<<"$out"; then
            echo "::error::scope=project missing project-aware codex final message"
            exit 1
          fi

      - name: --scope=project — gemini writes only GEMINI.md (refs #2 #3)
        shell: bash
        run: |
          set -eo pipefail
          unset ROLEPOD_TARGET
          WORK="$(mktemp -d)"
          BEFORE_HOME=$(find "$HOME/.gemini" -type f 2>/dev/null | wc -l)
          out=$(cd "$WORK" && bash "$GITHUB_WORKSPACE/install.sh" --target=gemini --scope=project --dry-run 2>&1)
          if ! grep -qi 'Gemini extensions are global only' <<<"$out"; then
            echo "::error::scope=project missing 'extensions are global only' warning for gemini"
            exit 1
          fi
          if ! grep -qF "$WORK/GEMINI.md" <<<"$out"; then
            echo "::error::scope=project did not preview \$PWD/GEMINI.md for gemini"
            exit 1
          fi
          # Must NOT preview the extension tree.
          if grep -qF "$HOME/.gemini/extensions/rolepod" <<<"$out"; then
            echo "::error::scope=project leaked \$HOME/.gemini/extensions path"
            exit 1
          fi
          AFTER_HOME=$(find "$HOME/.gemini" -type f 2>/dev/null | wc -l)
          if [ "$BEFORE_HOME" -ne "$AFTER_HOME" ]; then
            echo "::error::scope=project --dry-run mutated \$HOME/.gemini"
            exit 1
          fi

      - name: --scope=project --target=all — only project files (refs #2 #3)
        shell: bash
        run: |
          set -eo pipefail
          unset ROLEPOD_TARGET
          WORK="$(mktemp -d)"
          out=$(cd "$WORK" && bash "$GITHUB_WORKSPACE/install.sh" --target=all --scope=project --dry-run 2>&1)
          # All three project paths must appear.
          for p in "$WORK/.claude" "$WORK/AGENTS.md" "$WORK/GEMINI.md"; do
            if ! grep -qF "$p" <<<"$out"; then
              echo "::error::scope=project --target=all missing $p"
              printf '%s\n' "$out"
              exit 1
            fi
          done
          # No global home paths.
          for h in "$HOME/.claude" "$HOME/.codex" "$HOME/.gemini/extensions"; do
            if grep -qF "$h" <<<"$out"; then
              echo "::error::scope=project --target=all leaked global path: $h"
              printf '%s\n' "$out"
              exit 1
            fi
          done

      - name: No 'Device not configured' across all install runs (refs #2)
        shell: bash
        run: |
          set -eo pipefail
          # Global negative assertion: re-run a sweep of common install/uninstall
          # invocations and confirm none emit the macOS "Device not configured"
          # error from /dev/tty redirects.
          fail=0
          for cmd in \
            "bash install.sh --target=claude --dry-run" \
            "bash install.sh --target=codex --dry-run" \
            "bash install.sh --target=gemini --dry-run" \
            "bash install.sh --target=all --dry-run"
          do
            out=$(ROLEPOD_TARGET="$(mktemp -d)" $cmd < /dev/null 2>&1) || true
            if grep -qi 'Device not configured' <<<"$out"; then
              echo "::error::'$cmd' emitted 'Device not configured'"
              printf '%s\n' "$out"
              fail=1
            fi
          done
          # Also non-TTY uninstall.
          out=$(ROLEPOD_TARGET="$(mktemp -d)" bash install.sh --uninstall --target=codex < /dev/null 2>&1) || true
          if grep -qi 'Device not configured' <<<"$out"; then
            echo "::error::non-TTY uninstall emitted 'Device not configured'"
            printf '%s\n' "$out"
            fail=1
          fi
          exit "$fail"

      - name: Skill triggering harness
        shell: bash
        run: |
          set -eo pipefail
          # TDD-for-skills regression net. The runner skips cleanly when the
          # `claude` CLI is not available on the runner (CI runners typically
          # lack it), so this step is informational on CI but enforcing locally.
          if [ ! -x tests/skill-triggering/run.sh ]; then
            echo "::error::tests/skill-triggering/run.sh missing or not executable"
            exit 1
          fi
          # bash -n syntax check is mandatory regardless of CLI availability.
          bash -n tests/skill-triggering/run.sh
          # Run the harness; missing CLI → exit 0 with a skip notice.
          bash tests/skill-triggering/run.sh
